name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev cmake pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release

      - name: Archive binary
        run: tar -czf videotrim-x86_64-linux.tar.gz -C target/release videotrim

      - name: Create release and upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} videotrim-x86_64-linux.tar.gz --title ${{ github.ref_name }} --generate-notes
